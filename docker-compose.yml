
services:
  # ── Infrastructure ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: bridge
      POSTGRES_DB: bridge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: bridge
      MINIO_ROOT_PASSWORD: bridgeminio
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init.sh
    volumes:
      - ./infra/minio-init.sh:/init.sh:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - wa-service

  # ── Application Services ──────────────────────────────────
  wa-service:
    build: ./wa-service
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-bridge}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-bridgeminio}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://83.217.222.126:9000}
      - S3_BUCKET=${S3_BUCKET:-bridge-media}
      - DATABASE_URL=${DATABASE_URL:-postgresql://bridge:bridge@postgres:5432/bridge}
      - PORT=3000
    volumes:
      - wa_sessions:/app/.wwebjs_auth
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  processor:
    build: ./processor
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://bridge:bridge@postgres:5432/bridge}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_ENDPOINT=${LANGCHAIN_ENDPOINT}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-bridge-v2}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TARGET_LANGUAGE=${TARGET_LANGUAGE:-Russian}
      - TRANSLATION_CACHE_TTL=${TRANSLATION_CACHE_TTL:-86400}
      - ADMIN_TG_IDS=${ADMIN_TG_IDS}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  bot:
    build: ./bot
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8001:8001"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=${DATABASE_URL:-postgresql://bridge:bridge@postgres:5432/bridge}
      - WA_SERVICE_URL=http://wa-service:3000
      - WA_SERVICE_PUBLIC_URL=${WA_SERVICE_PUBLIC_URL:-http://localhost:3000}
      - ADMIN_TG_IDS=${ADMIN_TG_IDS}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  analytics:
    build: ./analytics
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://bridge:bridge@postgres:5432/bridge}
      - BIGQUERY_PROJECT=${BIGQUERY_PROJECT}
      - BIGQUERY_DATASET=${BIGQUERY_DATASET:-bridge_analytics}
      - PREFECT_API_URL=${PREFECT_API_URL}
      - PREFECT_API_KEY=${PREFECT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_TG_IDS=${ADMIN_TG_IDS}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-sa.json
    volumes:
      # Mount only if file exists locally — skip for local dev without BigQuery
      - ${GCP_SA_PATH:-/dev/null}:/app/gcp-sa.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  wa_sessions:
  minio_data:
  certbot_webroot:
