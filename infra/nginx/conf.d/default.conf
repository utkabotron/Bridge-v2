server {
    listen 80;
    server_name brdg.tools;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name brdg.tools;

    ssl_certificate     /etc/letsencrypt/live/brdg.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brdg.tools/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Processor dashboard (Basic Auth) ─────────────────────
    location /dashboard {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/stats {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reports {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/costs {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/daily-stats {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/backlog {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/profiles {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /events {
        auth_basic "Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://processor:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── wa-service (default) ─────────────────────────────────
    location / {
        proxy_pass http://wa-service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
