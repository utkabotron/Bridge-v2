name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint processor
        run: ruff check processor/src/

      - name: Lint bot
        run: ruff check bot/src/

      - name: Lint analytics
        run: ruff check analytics/flows/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install processor deps
        run: pip install -r processor/requirements.txt

      - name: Install bot deps
        run: pip install -r bot/requirements.txt

      - name: Run processor tests
        env:
          OPENAI_API_KEY: sk-test-dummy
          REDIS_HOST: localhost
        run: pytest processor/tests/ -v --tb=short

      - name: Run bot tests
        run: pytest bot/tests/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build wa-service
        uses: docker/build-push-action@v5
        with:
          context: ./wa-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build processor
        uses: docker/build-push-action@v5
        with:
          context: ./processor
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build analytics
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
