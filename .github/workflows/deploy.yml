name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: bridge-v2

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set short SHA
        id: sha
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # ── Build & push images ─────────────────────────────
      - name: Build & push wa-service
        uses: docker/build-push-action@v5
        with:
          context: ./wa-service
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/bridge-v2-wa-service:${{ steps.sha.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/bridge-v2-wa-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push processor
        uses: docker/build-push-action@v5
        with:
          context: ./processor
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/bridge-v2-processor:${{ steps.sha.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/bridge-v2-processor:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push bot
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/bridge-v2-bot:${{ steps.sha.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/bridge-v2-bot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push analytics
        uses: docker/build-push-action@v5
        with:
          context: ./analytics
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/bridge-v2-analytics:${{ steps.sha.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/bridge-v2-analytics:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── ECS deployments ─────────────────────────────────
      # processor, bot, analytics: rolling update (stateless)
      - name: Deploy processor
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service processor \
            --force-new-deployment \
            --no-cli-pager

      - name: Deploy bot
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service bot \
            --force-new-deployment \
            --no-cli-pager

      - name: Deploy analytics
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service analytics \
            --force-new-deployment \
            --no-cli-pager

      # wa-service: sessions stored in EFS — requires manual rollout
      # (stop old task first to avoid dual-write to auth dir)
      - name: Deploy wa-service (manual EFS-safe)
        run: |
          echo "::notice::wa-service image pushed to ECR."
          echo "::notice::Manual rollout required: stop existing task, then start new one."
          echo "::notice::Image: $ECR_REGISTRY/bridge-v2-wa-service:${{ steps.sha.outputs.tag }}"

      - name: Wait for processor stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services processor bot analytics \
            --no-cli-pager
