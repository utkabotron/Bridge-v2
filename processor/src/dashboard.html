<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bridge v2 Pipeline</title>
<style>
  body { background:#bbb; color:#111; font:18px/1.5 monospace; margin:0; padding:20px; }
  pre { margin:0; overflow:hidden; }
  .logo { line-height:1.03; margin-bottom:4px; }
  #top { border-bottom:2px solid #888; padding-bottom:12px; margin-bottom:12px; }
  .wrap { display:flex; gap:0; }
  .left, .right { flex:1; min-width:0; overflow:hidden; }
  .left { border-right:2px solid #888; padding-right:16px; }
  .right { padding-left:16px; }
  .g { color:#060; } .r { color:#900; } .y { color:#860; }
  .c { color:#068; } .w { color:#000; } .d { color:#666; }
  .reports { margin-top:20px; padding:20px; }
  .reports pre { white-space:pre-wrap; }
  .date-nav { cursor:pointer; user-select:none; }
  .date-nav:hover { color:#068; }
  .bl-btn { cursor:pointer; padding:0 4px; user-select:none; }
  .bl-btn:hover { text-decoration:underline; }
</style>
</head>
<body>
<pre id="top"></pre>
<div class="wrap">
  <pre id="left" class="left"></pre>
  <pre id="right" class="right"></pre>
</div>
<div class="reports">
  <pre id="reports"></pre>
</div>
<div class="reports">
  <pre id="backlog"></pre>
</div>
<div class="reports">
  <pre id="profiles"></pre>
</div>
<script>
const NN = ['validate','translate','format','deliver'];
const W = 10;
let ns={}, stats={ok:0,fail:0,skip:0,lat:[]}, conn=false, logs=[], msg=null, users=[], costsData=null, dailyStats=null;

function reset() { ns={}; NN.forEach(n=>ns[n]={s:'idle',d:'',info:[]}); msg=null; }
reset();

function pad(s,w) { s=String(s); return s.length>=w ? s.substring(0,w) : s+' '.repeat(w-s.length); }
function c(cl,t) { return '<span class="'+cl+'">'+t+'</span>'; }

function charWidth() {
  const m=document.createElement('pre');
  m.style.cssText='position:absolute;visibility:hidden;white-space:pre;font:inherit';
  m.textContent='X'.repeat(200);
  document.body.appendChild(m);
  const cw=m.offsetWidth/200;
  document.body.removeChild(m);
  return cw;
}

function elCols(id) {
  const el=document.getElementById(id);
  if(!el) return 55;
  const cw=charWidth();
  const st=getComputedStyle(el);
  const padL=parseFloat(st.paddingLeft)||0;
  const padR=parseFloat(st.paddingRight)||0;
  return Math.floor((el.clientWidth - padL - padR) / cw);
}

let TW=0, LW=0, RW=0, measured=false;
function measure() {
  if(measured) return;
  TW=elCols('top');
  LW=elCols('left'); RW=elCols('right');
  if(TW>10) measured=true;
}

function renderTop() {
  let o = '';
  o += '<div class="logo">';
  const logo=[
    '\u2591\u2588\u2580\u2588\u2591\u2588\u2580\u2588\u2591\u2580\u2588\u2580\u2591\u2588\u2580\u2588\u2591\u2588\u2580\u2580\u2591\u2588\u2580\u2580\u2591\u2591\u2591\u2580\u2588\u2580\u2591\u2588\u2580\u2588\u2591\u2588\u2580\u2588\u2591\u2588\u2591\u2591\u2591\u2588\u2580\u2580\u2591\u2591\u2591\u2588\u2580\u2588\u2591\u2580\u2588\u2580\u2591\u2588\u2580\u2588\u2591\u2588\u2580\u2580\u2591\u2588\u2591\u2591\u2591\u2580\u2588\u2580\u2591\u2588\u2580\u2588\u2591\u2588\u2580\u2580',
    '\u2591\u2588\u2580\u2584\u2591\u2588\u2580\u2584\u2591\u2591\u2588\u2591\u2591\u2588\u2591\u2588\u2591\u2588\u2591\u2588\u2591\u2588\u2580\u2580\u2591\u2591\u2591\u2591\u2588\u2591\u2591\u2588\u2591\u2588\u2591\u2588\u2591\u2588\u2591\u2588\u2591\u2591\u2591\u2580\u2580\u2588\u2591\u2591\u2591\u2588\u2580\u2580\u2591\u2591\u2588\u2591\u2591\u2588\u2580\u2580\u2591\u2588\u2580\u2580\u2591\u2588\u2591\u2591\u2591\u2591\u2588\u2591\u2591\u2588\u2591\u2588\u2591\u2588\u2580\u2580',
    '\u2591\u2580\u2580\u2580\u2591\u2580\u2591\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2591\u2591\u2591\u2580\u2591\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2591\u2591\u2580\u2591\u2591\u2591\u2580\u2580\u2580\u2591\u2580\u2591\u2591\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2580\u2580\u2591\u2580\u2591\u2580\u2591\u2580\u2580\u2580',
  ];
  o+=c('w','\u2591'.repeat(TW))+'\n';
  logo.forEach(l=>{o+=c('w',l+'\u2591'.repeat(Math.max(0,TW-l.length)))+'\n';});
  o+=c('w','\u2591'.repeat(TW))+'\n';
  o += '</div>';
  o += c('d','='.repeat(TW)) + '\n';

  const dot = conn ? c('g','[connected]') : c('r','[disconnected]');
  const ds = dailyStats || {};
  const dok = ds.delivered||0, dfail = ds.failed||0, dskip = ds.skipped||0;
  const davg = ds.avg_ms ? Math.round(ds.avg_ms)+'ms' : '--';
  const dtl = ds.direct_translations||0, dma = ds.direct_analyses||0;
  o += ' '+dot+'  '+c('d','today: ')+c('g',dok)+' ok  '+c('r',dfail)+' fail  '+c('y',dskip)+' skip  avg:'+c('c',davg)+'  '+c('d','direct:')+' '+c('c',dtl)+' tl  '+c('c',dma)+' ma\n';
  const dtotal = dok + dfail + dskip;
  if (dtotal > 0) {
    const barW = TW - 2;
    const okW = Math.round(dok / dtotal * barW);
    const failW = Math.round(dfail / dtotal * barW);
    const skipW = barW - okW - failW;
    o += ' ' + c('g','\u2588'.repeat(okW)) + c('r','\u2588'.repeat(failW)) + c('y','\u2588'.repeat(skipW)) + '\n';
  }
  o += c('d','-'.repeat(TW)) + '\n';

  if (msg) {
    o += ' '+c('y','processing message...')+'\n';
  } else {
    o += ' '+c('d','waiting for messages...')+'\n';
  }
  o += '\n';

  // horizontal pipeline: 4 boxes in a row
  const BW = 18; // box inner width
  const arrow = '  >>>  ';
  const arrowLen = 7;

  // static labels per node (always shown)
  const labels = {
    validate: ['time:','pair:','lang:','type:'],
    translate:['time:','mode:'],
    format:   ['time:','len: '],
    deliver:  ['time:','status:','total:'],
  };
  const infoRows = 4; // max label rows

  // build each box as arrays of lines
  const boxes = NN.map(n => {
    const st=ns[n]; let cl='d',mk=' ';
    if(st.s==='active'){cl='y';mk='*';}
    if(st.s==='done'){cl='g';mk='+';}
    if(st.s==='failed'){cl='r';mk='x';}
    if(st.s==='skipped'){cl='d';mk='-';}

    const top = c(cl,'+'+'-'.repeat(BW)+'+');
    const nm  = c(cl,'| '+mk+' '+pad(n,BW-4)+' |');
    const bot = c(cl,'+'+'-'.repeat(BW)+'+');
    return {lines:[top,nm,bot], cl:cl, info:st.info||[], labels:labels[n]};
  });

  // render box lines horizontally
  for(let row=0;row<3;row++){
    let line='';
    boxes.forEach((b,i)=>{
      if(i>0){
        if(row===1) line+=c(boxes[i-1].cl,arrow);
        else line+=' '.repeat(arrowLen);
      }
      line+=b.lines[row];
    });
    o+=line+'\n';
  }
  // info lines under each box (always reserved)
  for(let row=0;row<infoRows;row++){
    let line='';
    boxes.forEach((b,i)=>{
      if(i>0) line+=' '.repeat(arrowLen);
      const lbl=b.labels[row]||'';
      const val=b.info[row]||'';
      if(lbl){
        const cell=c('d',lbl)+' '+val;
        const plainLen=lbl.length+1+stripTags(val).length;
        line+=' '+cell+' '.repeat(Math.max(0,BW+1-plainLen));
      } else {
        line+=' '.repeat(BW+2);
      }
    });
    o+=line+'\n';
  }
  o+='\n';

  // log entries
  o += c('d','-'.repeat(TW)) + '\n';
  const maxLogs = 8;
  const start = Math.max(0, logs.length - maxLogs);
  for(let i=start;i<logs.length;i++) o+=logs[i]+'\n';

  document.getElementById('top').innerHTML=o;
}

function stripTags(s){return s.replace(/<[^>]*>/g,'');}

function renderLeft() {
  let o='';
  o+=c('c','Users')+'\n';
  o+=c('d','='.repeat(LW))+'\n';
  o+=c('d',' '+pad('user',16)+pad('wa',5)+pad('lang',8)+pad('pairs',6)+pad('ok',6)+pad('fail',6)+pad('drTL',6)+pad('drMA',6)+'last')+'\n';
  o+=c('d',' '+'-'.repeat(LW-2))+'\n';

  if(users.length===0){
    o+=' '+c('d','loading...')+'\n';
  } else {
    users.forEach(u=>{
      const nm=pad(u.tg_username||String(u.tg_user_id),16);
      const wa=u.wa_connected?c('g','on  '):c('d','off ');
      const lang=pad(u.target_language||'--',8);
      const pairs=pad(String(u.pairs),6);
      const ok=u.delivered>0?c('g',pad(String(u.delivered),6)):pad('0',6);
      const fail=u.failed>0?c('r',pad(String(u.failed),6)):pad('0',6);
      const dtl=u.dir_tl>0?c('c',pad(String(u.dir_tl),6)):pad('0',6);
      const dma=u.dir_ma>0?c('c',pad(String(u.dir_ma),6)):pad('0',6);
      const last=u.last_msg?timeAgo(u.last_msg):c('d','never');
      o+=' '+nm+wa+' '+lang+pairs+ok+fail+dtl+dma+last+'\n';
    });
  }

  document.getElementById('left').innerHTML=o;
}

function renderRight() {
  let o='';
  o+=c('c','Chat Pairs')+'\n';
  o+=c('d','='.repeat(RW))+'\n';
  o+=c('d',' '+'-'.repeat(RW-2))+'\n';
  let totalPairs=0, activePairs=0;
  users.forEach(u=>{totalPairs+=u.pairs; if(u.wa_connected)activePairs+=u.pairs;});
  o+=' total pairs:  '+c('w',totalPairs)+'\n';
  o+=' active users: '+c('w',users.filter(u=>u.wa_connected).length)+'/'+users.length+'\n';
  const totalOk=users.reduce((a,u)=>a+u.delivered,0);
  const totalFail=users.reduce((a,u)=>a+u.failed,0);
  const avgStr=totalAvgMs?Math.round(totalAvgMs)+'ms':'--';
  o+=' total msgs:   '+c('g',totalOk)+' ok  '+c('r',totalFail)+' fail  '+c('y',totalSkipped)+' skip  avg:'+c('c',avgStr)+'\n';

  // ── Costs section ──
  o+='\n'+c('d','='.repeat(RW))+'\n';
  o+=c('c','Costs (7d)')+'\n';
  o+=c('d',' '+'-'.repeat(RW-2))+'\n';
  if(costsData){
    const d=costsData;
    o+=' total: '+c('w','$'+d.total_cost.toFixed(2))+'  ('+c('w',fmtK(d.total_tokens))+' tok, '+c('w',d.total_runs)+' calls)\n';
    const today=new Date().toISOString().slice(0,10);
    const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
    const todayD=d.by_day.find(x=>x.date===today);
    const yesterD=d.by_day.find(x=>x.date===yesterday);
    o+=' today: '+c('w','$'+(todayD?todayD.cost.toFixed(2):'0.00'));
    o+='  yesterday: '+c('w','$'+(yesterD?yesterD.cost.toFixed(2):'0.00'))+'\n';
    const avg=d.period_days>0?(d.total_cost/d.period_days):0;
    o+=' avg/day: '+c('w','$'+avg.toFixed(2))+'\n';
  } else {
    o+=' '+c('d','loading...')+'\n';
  }

  document.getElementById('right').innerHTML=o;
}

function fmtK(n){return n>=1000?Math.round(n/1000)+'K':String(n);}

function render() { measure(); renderTop(); renderLeft(); renderRight(); }

function log(text) {
  const h=new Date().toLocaleTimeString('en-GB',{hour12:false});
  logs.push(' '+c('d',h)+' '+text);
  if(logs.length>200) logs.shift();
}

function handle(e) {
  switch(e.type) {
    case 'message_received':
      reset();
      msg={type:e.msg_type||'text'};
      ns.validate.s='active'; ns.validate.d='...';
      log(c('c','[IN]')+' '+c('w',e.msg_type||'text'));
      break;
    case 'node_done': {
      const n=e.node;
      let d=e.elapsed_ms+'ms';
      if(n==='translate'&&e.cache_hit)d='cached';
      else if(n==='translate'&&e.translation_ms)d=e.translation_ms+'ms';
      if(e.error)d=e.error.substring(0,12);
      ns[n].s=e.status==='skipped'?'skipped':e.error?'failed':'done'; ns[n].d=d;

      // info values per node (match labels order: time, then node-specific)
      if(n==='validate'){
        ns[n].info=[
          c('w',d),
          c('w',e.chat_pair_id||'none'),
          c('c',e.target_lang||'--'),
          c('w',e.msg_type||'text'),
        ];
      } else if(n==='translate'){
        ns[n].info=[
          c('w',d),
          e.cache_hit?c('g','CACHE HIT'):c('y','LLM'),
        ];
      } else if(n==='format'){
        ns[n].info=[
          c('w',d),
          c('w',(e.text_len||0)+' chars'),
        ];
      } else if(n==='deliver'){
        const ok=e.delivery_status==='delivered';
        ns[n].info=[
          c('w',d),
          ok?c('g','delivered'):e.delivery_status==='skipped'?c('y','skipped'):c('r',e.delivery_status||'--'),
          c('w',e.elapsed_ms+'ms'),
        ];
      }

      const idx=NN.indexOf(n);
      if((e.status==='failed'||e.status==='skipped')&&n==='validate'){
        ns.translate.s='skipped';ns.translate.d='skip';
        ns.format.s='skipped';ns.format.d='skip';
        ns.deliver.s='active';ns.deliver.d='...';
      } else if(idx<NN.length-1&&!e.error){
        ns[NN[idx+1]].s='active';ns[NN[idx+1]].d='...';
      }
      const cl=e.error?'r':'y';
      log(c(cl,'['+pad(n.toUpperCase(),9)+']')+' '+d+(e.cache_hit?' (cache)':''));
      break;
    }
    case 'message_delivered':
      stats.ok++; stats.lat.push(e.total_ms);
      if(stats.lat.length>100) stats.lat.shift();
      log(c('g','[OK]       ')+' '+e.total_ms+'ms'+(e.cache_hit?' (cached)':''));
      setTimeout(()=>{reset();render();},4000);
      loadUsers();
      loadDailyStats();
      break;
    case 'message_skipped':
      stats.skip++;
      log(c('y','[SKIP]     ')+' '+(e.error||'no_chat_pair'));
      setTimeout(()=>{reset();render();},4000);
      loadDailyStats();
      break;
    case 'message_failed':
      stats.fail++;
      log(c('r','[FAIL]     ')+' '+(e.error||'unknown'));
      setTimeout(()=>{reset();render();},4000);
      loadUsers();
      loadDailyStats();
      break;
  }
  render();
}

function connect() {
  const es=new EventSource('/events');
  es.onopen=()=>{conn=true;render();};
  es.onmessage=(e)=>{try{handle(JSON.parse(e.data))}catch(x){}};
  es.onerror=()=>{conn=false;render();es.close();setTimeout(connect,2000);};
}

function timeAgo(iso) {
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

let totalSkipped=0, totalAvgMs=null;
function loadUsers() {
  fetch('/api/stats').then(r=>r.json()).then(d=>{users=d.users;totalSkipped=d.total_skipped||0;totalAvgMs=d.total_avg_ms;render();}).catch(()=>{});
}

function loadCosts() {
  fetch('/api/costs?days=7').then(r=>r.json()).then(d=>{costsData=d;render();}).catch(()=>{});
}

function loadDailyStats() {
  fetch('/api/daily-stats').then(r=>r.json()).then(d=>{dailyStats=d;render();}).catch(()=>{});
}

// ── Reports section ──────────────────────────────────────
let reportData=null, reportDate='', reportDates=[];

function loadReports(dt) {
  const q=dt?'?date='+dt:'';
  fetch('/api/reports'+q).then(r=>r.json()).then(d=>{
    reportData=d; reportDate=d.date; reportDates=d.dates||[];
    renderReports();
  }).catch(()=>{});
}

function renderReports() {
  if(!reportData){document.getElementById('reports').innerHTML=c('d','Loading reports...');return;}
  let o='';
  const W=120;
  o+=c('d','='.repeat(W))+'\n';
  o+=c('c','Analytics Reports')+'\n';
  o+=c('d','='.repeat(W))+'\n\n';

  // Date navigation
  const idx=reportDates.indexOf(reportDate);
  const prev=idx<reportDates.length-1?reportDates[idx+1]:'';
  const next=idx>0?reportDates[idx-1]:'';
  const prevBtn=prev?'<span class="date-nav" onclick="loadReports(\''+prev+'\')">\u25C0 '+prev+'</span>':'          ';
  const nextBtn=next?'<span class="date-nav" onclick="loadReports(\''+next+'\')">'+next+' \u25B6</span>':'';
  o+=' '+prevBtn+' | '+c('w',reportDate)+' | '+nextBtn+'\n\n';

  // Nightly Problems
  o+=c('c','\uD83D\uDD0D Nightly Problems')+'\n';
  o+=c('d','-'.repeat(W))+'\n';
  const p=reportData.problems;
  if(p.summary){
    const s=p.summary.stats||p.summary;
    o+=' total: '+c('w',s.total_messages??'—');
    o+='  delivered: '+c('g',s.delivered??'—');
    o+='  failed: '+c('r',s.failed??'—');
    o+='  skipped: '+c('y',s.skipped??'—');
    o+='  pending: '+c('y',s.pending??'—');
    const avg=s.avg_translation_ms;
    o+='  avg_ms: '+c('c',avg?Math.round(avg):'—');
    o+='  slow(>3s): '+c('y',s.slow_translations??'—');
    if(s.mapped_total!=null) o+='  mapped: '+c('w',s.mapped_total)+' (fail:'+c('r',s.mapped_failed??0)+')';
    if(p.summary.mapped_failure_rate!=null) o+='  fail%: '+c(p.summary.mapped_failure_rate>10?'r':'y',p.summary.mapped_failure_rate+'%');
    o+='\n';
    if(p.summary.issues_total!=null) o+=' issues: '+c('r',p.summary.issues_critical??0)+' crit  '+c('y',p.summary.issues_warning??0)+' warn  '+c('d',p.summary.issues_info??0)+' info\n';
    o+='\n';
  } else {
    o+=' '+c('d','No problems data for this date')+'\n\n';
  }

  if(p.issues&&p.issues.length>0){
    const crit=p.issues.filter(i=>i.severity==='critical');
    const warn=p.issues.filter(i=>i.severity==='warning');
    const info=p.issues.filter(i=>i.severity==='info');
    function renderIssues(list,label,cl){
      if(!list.length)return;
      o+=' '+c(cl,label+' ('+list.length+')')+'\n';
      list.forEach(i=>{
        const ack=i.acknowledged?' [ack]':'';
        o+='   '+c(cl,'\u2022')+' '+c('w',esc(i.title))+c('d',ack)+'\n';
        if(i.description) o+='     '+c('d',esc(i.description).substring(0,W-6))+'\n';
        if(i.suggested_fix) o+='     fix: '+c('c',esc(i.suggested_fix).substring(0,W-10))+'\n';
      });
      o+='\n';
    }
    renderIssues(crit,'CRITICAL','r');
    renderIssues(warn,'WARNING','y');
    renderIssues(info,'INFO','d');
  } else if(p.summary) {
    o+=' '+c('g','No issues detected')+'\n\n';
  }

  // Translation Quality
  o+=c('c','\uD83D\uDCCA Translation Quality')+'\n';
  o+=c('d','-'.repeat(W))+'\n';
  const q=reportData.quality;
  if(q.summary){
    const qs=q.summary;
    const avg=qs.avg_scores||{};
    o+=' samples: '+c('w',qs.samples_evaluated??'—');
    o+='  quality: '+c('c',avg.quality??'—');
    o+='  accuracy: '+c('c',avg.accuracy??'—');
    o+='  naturalness: '+c('c',avg.naturalness??'—')+'\n';

    if(qs.issue_counts&&Object.keys(qs.issue_counts).length>0){
      o+=' issues: ';
      const entries=Object.entries(qs.issue_counts).sort((a,b)=>b[1]-a[1]);
      o+=entries.map(([k,v])=>c('y',k)+':'+v).join('  ')+'\n';
    }
    o+='\n';
  } else {
    o+=' '+c('d','No quality data for this date')+'\n\n';
  }

  if(q.suggestions&&q.suggestions.length>0){
    o+=' '+c('w','Prompt suggestions ('+q.suggestions.length+')')+'\n';
    q.suggestions.forEach((s,i)=>{
      const st=s.status||'pending';
      const stc=st==='applied'?'g':st==='rejected'?'r':'y';
      o+='   '+(i+1)+'. '+c('w',esc(s.suggestion))+' '+c(stc,'['+st+']')+'\n';
      if(s.rationale) o+='      '+c('d',esc(s.rationale))+'\n';
    });
  }

  document.getElementById('reports').innerHTML=o;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Backlog section ─────────────────────────────────────
let backlogData=[];

function loadBacklog() {
  fetch('/api/backlog').then(r=>r.json()).then(d=>{backlogData=d;renderBacklog();}).catch(()=>{});
}

function updateBacklog(id,status) {
  fetch('/api/backlog/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status})})
    .then(r=>r.json()).then(()=>{loadBacklog();}).catch(()=>{});
}

function renderBacklog() {
  const el=document.getElementById('backlog');
  if(!el) return;
  const W=120;
  let o='';
  o+=c('d','='.repeat(W))+'\n';
  o+=c('r','\uD83D\uDEA8 Critical Backlog')+'\n';
  o+=c('d','='.repeat(W))+'\n\n';

  if(backlogData.length===0){
    o+=' '+c('g','No open critical issues')+'\n';
  } else {
    o+=' '+c('w','Open issues: '+backlogData.length)+'\n\n';
    backlogData.forEach(i=>{
      const dt=i.source_run_date||'—';
      o+='  '+c('r','\u2022')+' '+c('w','#'+i.id)+' '+c('d','['+dt+']')+' '+c('w',esc(i.title))+'\n';
      if(i.description) o+='    '+c('d',esc(i.description).substring(0,W-6))+'\n';
      if(i.suggested_fix) o+='    fix: '+c('c',esc(i.suggested_fix).substring(0,W-10))+'\n';
      o+='    '+c('d','cat: '+esc(i.category));
      o+='  <span class="bl-btn g" onclick="updateBacklog('+i.id+',\'resolved\')">[resolve]</span>';
      o+='  <span class="bl-btn y" onclick="updateBacklog('+i.id+',\'wontfix\')">[wontfix]</span>\n\n';
    });
  }
  el.innerHTML=o;
}

// ── Chat Profiles section ────────────────────────────────
let profilesData=[];

function loadProfiles() {
  fetch('/api/profiles').then(r=>r.json()).then(d=>{profilesData=d;renderProfiles();}).catch(()=>{});
}

function renderProfiles() {
  const el=document.getElementById('profiles');
  if(!el) return;
  const W=120;
  let o='';
  o+=c('d','='.repeat(W))+'\n';
  o+=c('c','\uD83D\uDCD6 Chat Profiles')+'\n';
  o+=c('d','='.repeat(W))+'\n\n';

  if(profilesData.length===0){
    o+=' '+c('d','No chat profiles yet')+'\n';
  } else {
    profilesData.forEach(p=>{
      const pd=p.profile_data||{};
      const name=esc(pd.chat_description||pd.group_name||pd.chat_name||p.wa_chat_id||'unknown');
      const type=pd.chat_type||'—';
      const tone=pd.tone||'—';
      o+=c('y','\u25B8')+' '+c('w',name)+'  '+c('d','(pair #'+p.chat_pair_id+', v'+p.version+')')+'\n';
      o+='  type: '+c('c',esc(type))+'  tone: '+c('c',esc(typeof tone==='object'?JSON.stringify(tone):tone))+'\n';

      // Glossary (object: {word: {translation, note}})
      const glossary=pd.glossary||{};
      const glossaryKeys=Object.keys(glossary);
      if(glossaryKeys.length>0){
        const show=glossaryKeys.slice(0,8);
        o+='  '+c('c','Glossary')+' ('+glossaryKeys.length+'):\n';
        show.forEach(word=>{
          const info=glossary[word];
          if(typeof info==='object'){
            const tr=info.translation||'';
            const note=info.note||'';
            o+='    '+esc(word)+' \u2192 '+esc(tr);
            if(note) o+=' '+c('d','('+esc(note)+')');
          } else {
            o+='    '+esc(word)+' \u2192 '+esc(String(info));
          }
          o+='\n';
        });
        if(glossaryKeys.length>8) o+='    '+c('d','...and '+(glossaryKeys.length-8)+' more')+'\n';
      }

      // Members (object: {hebrew_name: transliterated_name})
      const members=pd.members||{};
      const memberKeys=Object.keys(members);
      if(memberKeys.length>0){
        const show=memberKeys.slice(0,8);
        o+='  '+c('c','Members')+' ('+memberKeys.length+'): ';
        o+=show.map(k=>esc(k)+' \u2192 '+esc(String(members[k]))).join(', ');
        if(memberKeys.length>8) o+=', '+c('d','+'+(memberKeys.length-8)+' more');
        o+='\n';
      }

      // Mentioned people (object: {name: {transliteration, relation}})
      const mentioned=pd.mentioned_people||{};
      const mentionedKeys=Object.keys(mentioned);
      if(mentionedKeys.length>0){
        const show=mentionedKeys.slice(0,8);
        o+='  '+c('c','Mentioned people')+' ('+mentionedKeys.length+'):\n';
        show.forEach(name=>{
          const info=mentioned[name];
          if(typeof info==='object'){
            const tr=info.transliteration||'';
            const rel=info.relation||'';
            o+='    '+esc(name)+' \u2192 '+esc(tr);
            if(rel) o+=' '+c('d','('+esc(rel)+')');
          } else {
            o+='    '+esc(name)+' \u2192 '+esc(String(info));
          }
          o+='\n';
        });
        if(mentionedKeys.length>8) o+='    '+c('d','...and '+(mentionedKeys.length-8)+' more')+'\n';
      }

      // Recurring topics (array of strings)
      const topics=pd.recurring_topics||[];
      if(topics.length>0){
        o+='  '+c('c','Topics')+' ('+topics.length+'): '+topics.map(t=>esc(t)).join(', ')+'\n';
      }

      // Stats
      const msgs=pd.messages_analyzed||0;
      const updated=p.updated_at?timeAgo(p.updated_at):'—';
      o+='  analyzed: '+c('w',msgs)+' msgs  updated: '+c('d',updated)+'\n\n';
    });
  }
  el.innerHTML=o;
}

window.addEventListener('resize',()=>{measured=false;render();});
// ensure DOM is ready before measuring
requestAnimationFrame(()=>{
  measure();
  connect();
  loadUsers();
  loadCosts();
  loadDailyStats();
  loadReports();
  loadBacklog();
  loadProfiles();
  setInterval(loadUsers,15000);
  setInterval(loadCosts,300000);
  setInterval(loadDailyStats,15000);
  setInterval(loadBacklog,30000);
  setInterval(loadProfiles,60000);
  setInterval(()=>{if(reportDate===new Date().toISOString().slice(0,10))loadReports();},60000);
  render();
});
